<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitched Video Frames</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Vertical gap between rows */
        }
        .scroll-container {
            width: 100%;
            overflow-x: auto;
            cursor: grab;
            user-select: none;
            border: 1px solid #333;
            border-radius: 8px;
            background: #111;
            padding: 10px 0; /* Padding inside row */
        }
        .scroll-container:active {
            cursor: grabbing;
        }
        .scroll-container img {
            height: 256px; /* Optimized height */
            display: block;
            pointer-events: none; /* Prevent browser drag of image */
        }
        /* Style scrollbar */
        .scroll-container::-webkit-scrollbar {
            height: 8px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #222;
        }
    </style>
</head>
<body>

<div id="gallery"></div>

<script>
    const imageFiles = [
        "stitched/4.jpg",
        "stitched/5.jpg",
        "stitched/6.jpg",
        "stitched/7.jpg",
        "stitched/9.jpg",
        "stitched/group_1_id_993410df-aa30-51a7-9a5f-83a73e08b547.jpg",
        "stitched/group_2_id_0e1259cf-2031-5301-bea2-44e47ce3a60e.jpg",
        "stitched/group_2_id_4b37a38d-dbb0-5d93-b552-3252787efe6d.jpg"
    ];

    const gallery = document.getElementById('gallery');

    imageFiles.forEach(src => {
        const container = document.createElement('div');
        container.className = 'scroll-container';
        
        const img = document.createElement('img');
        img.src = src;
        
        container.appendChild(img);
        gallery.appendChild(container);

        // Drag to scroll logic
        let isDown = false;
        let startX;
        let scrollLeft;

        container.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - container.offsetLeft;
            scrollLeft = container.scrollLeft;
        });
        container.addEventListener('mouseleave', () => {
            isDown = false;
        });
        container.addEventListener('mouseup', () => {
            isDown = false;
        });
        container.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const walk = (x - startX) * 2; // Drag speed
            container.scrollLeft = scrollLeft - walk;
        });
    });
</script>

</body>
</html>
