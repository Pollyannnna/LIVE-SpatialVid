    <title>LIVE on SpatialVID Dataset</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --accent-color: #bb86fc;
            --hover-accent: #3700b3;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        header {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(29,29,29,1) 0%, rgba(18,18,18,1) 100%);
            border-bottom: 1px solid #333;
        }
        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: -webkit-linear-gradient(45deg, var(--accent-color), #03dac6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: #aaaaaa;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }
        .gallery-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }
        .gif-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .gif-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(187, 134, 252, 0.2);
        }
        .gif-wrapper {
            width: 100%;
            padding-top: 100%; /* Default square ratio, adjusts depending on actual content */
            position: relative;
            background-color: #000;
        }
        .gif-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            margin-top: 4rem;
            border-top: 1px solid #333;
        }
    </style>
</head>
